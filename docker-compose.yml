
version: '3.8'
services:
  # Node-RED: Orquestación del flujo de datos, consumo MQTT y ruteo a base de datos
  nodered:
    image: nodered/node-red:latest
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    restart: unless-stopped

  # InfluxDB: Base de datos distribuida optimizada para telemetría de series temporales
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=lumenia2024
      - DOCKER_INFLUXDB_INIT_ORG=ITSOEH
      - DOCKER_INFLUXDB_INIT_BUCKET=Lumenia
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  # Grafana: Servidor web de renderizado analítico para tableros interactivos
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  nodered_data:
  influxdb_data:
  grafana_data:
